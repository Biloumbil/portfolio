<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contacter Nabil Dickeni — Digital Operations & Growth Specialist. Disponible pour missions freelance et stages." />
  <title>Contact — Nabil Dickeni</title>

  <!-- Fonts & Favicon -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar" role="banner">
    <div class="container navbar__inner">
      <a href="index.html" class="navbar__logo">Nabil <span style="color:var(--clr-accent)">Dickeni</span>

      <nav class="navbar__nav" role="navigation" aria-label="Navigation principale">
        <a href="index.html"    class="navbar__link" data-i18n="nav_home"></a>
        <a href="about.html"    class="navbar__link" data-i18n="nav_about"></a>
        <a href="projects.html" class="navbar__link" data-i18n="nav_projects"></a>
        <a href="contact.html"  class="navbar__link" data-i18n="nav_contact"></a>
        <div class="lang-switch" role="group" aria-label="Choix de langue">
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </nav>

      <div class="lang-switch" role="group" aria-label="Choix de langue">
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>

      <button class="navbar__burger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>


  <main>

    <!-- ===== HERO CONTACT ===== -->
    <section class="contact-hero" aria-labelledby="contact-title">
      <div class="container">
        <p class="section-label reveal" data-i18n="contact_label"></p>
        <h1 id="contact-title" class="display-lg reveal reveal-delay-1" data-i18n="contact_title"></h1>
      </div>
    </section>


    <!-- ===== GRILLE CONTACT ===== -->
    <section class="section" style="padding-top:0;" aria-label="Informations de contact">
      <div class="container">
        <div class="contact-grid">

          <!-- Infos gauche -->
          <div>
            <p class="contact-info__desc reveal" data-i18n="contact_desc"></p>

            <!-- Liens de contact -->
            <div class="contact-links reveal reveal-delay-1">

              <a href="mailto:dickenitchagnaou@gmail.com" class="contact-link">
                <div class="contact-link__icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                  </svg>
                </div>
                <div>
                  <div style="font-size:var(--text-xs); color:var(--clr-muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;">Email</div>
                  <div data-i18n="contact_email"></div>
                </div>
              </a>

              <a href="https://www.linkedin.com/in/nabil-dickeni" class="contact-link" target="_blank" rel="noopener noreferrer">
                <div class="contact-link__icon">
                  <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                  </svg>
                </div>
                <div>
                  <div style="font-size:var(--text-xs); color:var(--clr-muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;">LinkedIn</div>
                  <div data-i18n="contact_linkedin"></div>
                </div>
              </a>

              <a href="https://github.com/Biloumbil" class="contact-link" target="_blank" rel="noopener noreferrer">
                <div class="contact-link__icon">
                  <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                  </svg>
                </div>
                <div>
                  <div style="font-size:var(--text-xs); color:var(--clr-muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;">GitHub</div>
                  <div>github.com/Biloumbil</div>
                </div>
              </a>

              <div class="contact-link" style="cursor:default;">
                <div class="contact-link__icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                </div>
                <div>
                  <div style="font-size:var(--text-xs); color:var(--clr-muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;">Location</div>
                  <div data-i18n="contact_location"></div>
                </div>
              </div>

            </div>

            <!-- Disponibilité -->
            <div class="reveal reveal-delay-2" style="margin-top:var(--space-lg); padding:var(--space-md); background:var(--clr-dark); border-radius:var(--radius-lg); color:var(--clr-white);">
              <div style="display:flex; align-items:center; gap:var(--space-xs); margin-bottom:var(--space-xs);">
                <span style="width:10px; height:10px; background:#4ade80; border-radius:50%; display:inline-block; box-shadow:0 0 8px rgba(74,222,128,0.6);"></span>
                <span style="font-family:var(--font-display); font-size:var(--text-sm); font-weight:700;">Disponible</span>
              </div>
              <p style="font-size:var(--text-sm); color:rgba(255,255,255,0.6); line-height:1.65; font-weight:300;">
                Ouvert aux missions freelance et opportunités de collaboration — localement à Lomé et à distance.
              </p>
            </div>

          </div>

          <!-- Formulaire droite -->
          <div class="reveal reveal-delay-2">
            <div class="contact-form">

              <h2 style="font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; margin-bottom:var(--space-md); letter-spacing:-0.02em;">
                Envoyer un message
              </h2>

              <form id="contact-form" action="https://formspree.io/f/mgoblrbq" method="POST" novalidate>

                <div class="grid-2" style="gap:var(--space-sm);">
                  <div class="form-group">
                    <label class="form-label" for="name" data-i18n="form_name"></label>
                    <input
                      class="form-input"
                      type="text"
                      id="name"
                      name="name"
                      data-i18n-placeholder="form_name"
                      placeholder="Votre nom"
                      required
                      autocomplete="name"
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="email" data-i18n="form_email"></label>
                    <input
                      class="form-input"
                      type="email"
                      id="email"
                      name="email"
                      data-i18n-placeholder="form_email"
                      placeholder="Votre email"
                      required
                      autocomplete="email"
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="subject" data-i18n="form_subject"></label>
                  <input
                    class="form-input"
                    type="text"
                    id="subject"
                    name="subject"
                    data-i18n-placeholder="form_subject"
                    placeholder="Sujet"
                    required
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="message" data-i18n="form_message"></label>
                  <textarea
                    class="form-textarea"
                    id="message"
                    name="message"
                    data-i18n-placeholder="form_message"
                    placeholder="Votre message"
                    required
                  ></textarea>
                </div>

                <input type="text" name="_gotcha" style="display:none" />

                <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                  </svg>
                  <span data-i18n="form_send"></span>
                </button>

              </form>

              <!-- Message succès -->
              <div class="form-success" role="alert" aria-live="polite">
                <div style="font-size:3rem; margin-bottom:var(--space-sm);">🎉</div>
                <h3 style="font-family:var(--font-display); font-size:var(--text-xl); font-weight:700; margin-bottom:var(--space-xs);">
                  Message envoyé !
                </h3>
                <p style="color:var(--clr-muted); font-size:var(--text-sm);" data-i18n="form_success"></p>
              </div>

            </div>

          </div>

        </div>
      </div>
    </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" role="contentinfo">
    <div class="container footer__inner">
      <a href="index.html" class="footer__logo">Nabil <span>Dickeni</span></a>
      <p class="footer__copy" data-i18n="footer_copy"></p>
      <nav class="footer__links" aria-label="Liens réseaux sociaux">
        <a href="https://www.linkedin.com/in/nabil-dickeni" class="footer__link" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="mailto:dickenitchagnaou@gmail.com" class="footer__link">Email</a>
        <a href="https://github.com/Biloumbil" class="footer__link" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="contact.html" class="footer__link" data-i18n="nav_contact"></a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
